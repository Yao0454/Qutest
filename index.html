<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>蛆度测试 — 你到底有多蛆？</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&family=Syne:wght@700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="page">
            <!-- ===== INTRO ===== -->
            <section id="intro">
                <div class="intro-badge">蛆度科学研究院 出品</div>
                <h1 class="intro-title">你有多蛆？</h1>
                <p class="intro-sub">
                    经过严肃的<em>伪科学研究</em>，本测试将从四大维度精准鉴定你的蛆属等级。<br />
                    共25题，含抗乱选机制，建议诚实作答（虽然你可能不敢）
                </p>
                <div class="intro-stats">
                    <div class="stat-item">
                        <div class="stat-num">100</div>
                        <div class="stat-label">题库总量</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">25</div>
                        <div class="stat-label">随机抽题</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">4</div>
                        <div class="stat-label">检测维度</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">9</div>
                        <div class="stat-label">蛆属等级</div>
                    </div>
                </div>
                <button class="btn-start" onclick="startQuiz()">
                    开始检测蛆性 →
                </button>
                <p class="warning-text">
                    ⚠ 本测试结果可能引发不适，请做好心理准备
                </p>
            </section>

            <!-- ===== QUIZ ===== -->
            <section id="quiz">
                <div class="quiz-header">
                    <div class="quiz-progress-wrap">
                        <div class="quiz-progress-label">
                            <span id="progress-text">第 1 / 25 题</span>
                            <span id="progress-pct">0%</span>
                        </div>
                        <div class="quiz-progress-bar">
                            <div
                                class="quiz-progress-fill"
                                id="progress-fill"
                                style="width: 0%"
                            ></div>
                        </div>
                    </div>
                    <span class="quiz-category-badge" id="cat-badge">——</span>
                </div>

                <div class="question-card" id="question-card">
                    <div class="question-num" id="question-num">01</div>
                    <div class="question-text" id="question-text">
                        题目加载中...
                    </div>
                    <div class="options-grid" id="options-grid"></div>
                </div>

                <div class="quiz-nav">
                    <button
                        class="btn-nav"
                        id="btn-prev"
                        onclick="prevQ()"
                        disabled
                    >
                        ← 上一题
                    </button>
                    <span
                        style="font-size: 0.8rem; color: var(--muted)"
                        id="answered-count"
                        >已答 0 / 25</span
                    >
                    <button
                        class="btn-next"
                        id="btn-next"
                        onclick="nextQ()"
                        disabled
                    >
                        下一题 →
                    </button>
                </div>
            </section>

            <!-- ===== RESULT ===== -->
            <section id="result">
                <div class="result-wrap">
                    <div class="result-level-badge" id="result-badge">——</div>
                    <div class="result-creature" id="result-creature">🦟</div>
                    <h2 class="result-title" id="result-title">正在计算...</h2>
                    <div class="result-score-ring">
                        <svg viewBox="0 0 160 160">
                            <circle class="ring-bg" cx="80" cy="80" r="68" />
                            <circle
                                class="ring-fill"
                                id="ring-fill"
                                cx="80"
                                cy="80"
                                r="68"
                                stroke-dasharray="427.26"
                                stroke-dashoffset="427.26"
                            />
                        </svg>
                        <div class="result-score-center">
                            <div class="result-score-num" id="score-num">0</div>
                            <div class="result-score-label">蛆力值</div>
                        </div>
                    </div>
                    <p class="result-desc" id="result-desc"></p>
                    <div class="dimension-grid" id="dimension-grid"></div>
                    <div class="result-actions">
                        <button class="btn-retry" onclick="retryQuiz()">
                            再测一次（不信邪）
                        </button>
                        <button class="btn-share" onclick="shareResult()">
                            复制结果分享
                        </button>
                    </div>
                    <div class="copied-tip" id="copied-tip">
                        ✓ 已复制到剪贴板
                    </div>
                </div>
            </section>
        </div>

        <div class="anti-cheat-toast" id="toast"></div>

        <script src="main.js"></script>
    </body>
</html>
