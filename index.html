<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蛆度测试 — 你到底有多蛆？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="worm-canvas"></canvas>
<div class="page-overlay"></div>
<div class="page">

  <!-- ===== INTRO ===== -->
  <section id="intro">
    <h1 class="intro-title">你有多蛆？</h1>
    <p class="intro-sub">
      经过严肃的<em>伪科学研究</em>，本测试将从五大维度精准鉴定你的蛆属等级。<br>
      共30题，含抗乱选机制，建议诚实作答（虽然你可能不敢）
    </p>
    <div class="intro-stats">
      <div class="stat-item">
        <div class="stat-num">100</div>
        <div class="stat-label">题库总量</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">30</div>
        <div class="stat-label">随机抽题</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">5</div>
        <div class="stat-label">检测维度</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">9</div>
        <div class="stat-label">蛆属等级</div>
      </div>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始检测蛆性 →</button>
    <p class="warning-text">⚠ 本测试结果可能引发不适，请做好心理准备</p>
  </section>

  <!-- ===== QUIZ ===== -->
  <section id="quiz">
    <div class="quiz-header">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-label">
          <span id="progress-text">第 1 / 30 题</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <span class="quiz-category-badge" id="cat-badge">——</span>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-num" id="question-num">01</div>
      <div class="question-text" id="question-text">题目加载中...</div>
      <div class="options-grid" id="options-grid"></div>
    </div>

    <div class="quiz-nav">
      <button class="btn-nav" id="btn-prev" onclick="prevQ()" disabled>← 上一题</button>
      <span style="font-size:0.8rem;color:var(--muted)" id="answered-count">已答 0 / 30</span>
      <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>下一题 →</button>
    </div>
  </section>

  <!-- ===== RESULT ===== -->
  <section id="result">
    <div class="result-wrap">
      <div class="result-level-badge" id="result-badge">——</div>
      <span class="result-creature" id="result-creature">🦟</span>
      <h2 class="result-title" id="result-title">正在计算...</h2>
      <div class="result-score-ring">
        <svg viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="78"/>
          <circle class="ring-fill" id="ring-fill" cx="90" cy="90" r="78"
            stroke-dasharray="490.09" stroke-dashoffset="490.09"/>
        </svg>
        <div class="result-score-center">
          <div class="result-score-num" id="score-num">0</div>
          <div class="result-score-label">蛆力值</div>
        </div>
      </div>
      <p class="result-desc" id="result-desc"></p>
      <div class="dimension-grid" id="dimension-grid"></div>
      <div class="dim-comment" id="dim-comment"></div>
      <div class="self-coef-tag" id="self-coef-tag"></div>
      <div class="result-actions">
        <button class="btn-retry" onclick="retryQuiz()">再测一次（不信邪）</button>
        <button class="btn-share" onclick="shareResult()">复制结果分享</button>
      </div>
      <div class="copied-tip" id="copied-tip">✓ 已复制到剪贴板</div>
    </div>
  </section>

</div>

<div class="anti-cheat-toast" id="toast"></div>

<script>
// ========== 蠕动蛆背景动画 ==========
(function() {
  const canvas = document.getElementById('worm-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 蛆的配置
  const WORM_COUNT = 18;
  const worms = [];

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  class Worm {
    constructor() { this.reset(true); }

    reset(initial) {
      this.x = randomBetween(0, canvas.width);
      this.y = initial ? randomBetween(0, canvas.height) : randomBetween(-80, canvas.height + 80);
      this.len     = randomBetween(60, 200);
      this.thick   = randomBetween(1.5, 4.5);
      this.speed   = randomBetween(0.2, 0.7);
      this.angle   = randomBetween(0, Math.PI * 2);
      this.turnSpeed = randomBetween(0.008, 0.03) * (Math.random() > 0.5 ? 1 : -1);
      this.segments = [];
      this.alpha   = randomBetween(0.15, 0.45);
      this.hue     = randomBetween(255, 290); // 紫色区间
      this.phase   = randomBetween(0, Math.PI * 2);
      this.phaseSpeed = randomBetween(0.02, 0.06);
      // 初始化线段
      for (let i = 0; i < Math.floor(this.len / 6); i++) {
        this.segments.push({ x: this.x, y: this.y });
      }
    }

    update() {
      this.phase   += this.phaseSpeed;
      this.angle   += this.turnSpeed + Math.sin(this.phase) * 0.015;
      const dx = Math.cos(this.angle) * this.speed;
      const dy = Math.sin(this.angle) * this.speed;
      this.x += dx;
      this.y += dy;
      this.segments.unshift({ x: this.x, y: this.y });
      if (this.segments.length > Math.floor(this.len / 6)) {
        this.segments.pop();
      }
      // 超出屏幕重置
      const margin = 150;
      if (this.x < -margin || this.x > canvas.width + margin ||
          this.y < -margin || this.y > canvas.height + margin) {
        this.reset(false);
      }
    }

    draw() {
      if (this.segments.length < 2) return;
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.lineCap  = 'round';
      ctx.lineJoin = 'round';

      // 用贝塞尔曲线画身体，让它更流畅
      ctx.beginPath();
      ctx.moveTo(this.segments[0].x, this.segments[0].y);
      for (let i = 1; i < this.segments.length - 1; i++) {
        const mx = (this.segments[i].x + this.segments[i+1].x) / 2;
        const my = (this.segments[i].y + this.segments[i+1].y) / 2;
        ctx.quadraticCurveTo(this.segments[i].x, this.segments[i].y, mx, my);
      }

      // 渐变描边：头部亮，尾部淡
      const seg = this.segments;
      const grad = ctx.createLinearGradient(
        seg[0].x, seg[0].y,
        seg[seg.length-1].x, seg[seg.length-1].y
      );
      grad.addColorStop(0,   `hsla(${this.hue}, 80%, 75%, 1)`);
      grad.addColorStop(0.4, `hsla(${this.hue}, 70%, 60%, 0.8)`);
      grad.addColorStop(1,   `hsla(${this.hue}, 60%, 50%, 0)`);

      ctx.strokeStyle = grad;
      ctx.lineWidth   = this.thick;
      ctx.stroke();

      // 画头部亮点
      ctx.beginPath();
      ctx.arc(seg[0].x, seg[0].y, this.thick * 0.9, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 90%, 90%, 0.9)`;
      ctx.fill();

      ctx.restore();
    }
  }

  for (let i = 0; i < WORM_COUNT; i++) worms.push(new Worm());

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    worms.forEach(w => { w.update(); w.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
<script src="main.js"></script>
</body>
</html>
