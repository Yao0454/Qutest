<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蛆度测试 — 你到底有多蛆？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2e;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --glow: #c084fc;
    --red: #ef4444;
    --amber: #f59e0b;
    --green: #10b981;
    --text: #f1f0ff;
    --muted: #8b84a8;
    --border: rgba(124,58,237,0.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(168,85,247,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; }

  /* ===== INTRO ===== */
  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .intro-badge {
    display: inline-block;
    background: rgba(124,58,237,0.2);
    border: 1px solid rgba(124,58,237,0.4);
    color: var(--glow);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    border-radius: 999px;
    margin-bottom: 2rem;
    animation: fadeDown 0.6s ease both;
  }

  .intro-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    line-height: 1;
    margin-bottom: 1rem;
    animation: fadeDown 0.6s 0.1s ease both;
    background: linear-gradient(135deg, #fff 30%, var(--glow) 70%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .intro-sub {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 500px;
    line-height: 1.7;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  .intro-sub em {
    color: var(--glow);
    font-style: normal;
  }

  .intro-stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s 0.3s ease both;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--glow);
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 1rem 3rem;
    font-size: 1.1rem;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    border-radius: 999px;
    cursor: pointer;
    animation: fadeDown 0.6s 0.4s ease both;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(124,58,237,0.4);
    position: relative;
    overflow: hidden;
  }

  .btn-start::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(124,58,237,0.6);
  }

  .btn-start:hover::after { opacity: 1; }
  .btn-start:active { transform: translateY(0); }

  .warning-text {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    animation: fadeDown 0.6s 0.5s ease both;
  }

  /* ===== QUIZ ===== */
  #quiz { display: none; min-height: 100vh; padding: 2rem 1rem; }

  .quiz-header {
    max-width: 760px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .quiz-progress-wrap {
    flex: 1;
    min-width: 200px;
  }

  .quiz-progress-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
  }

  .quiz-progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
  }

  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--glow));
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .quiz-category-badge {
    font-size: 0.75rem;
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .cat-A { background: rgba(124,58,237,0.25); color: #c084fc; border: 1px solid rgba(124,58,237,0.3); }
  .cat-B { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .cat-C { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .cat-D { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

  .question-card {
    max-width: 760px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--glow), transparent);
  }

  .question-num {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .question-text {
    font-size: 1.15rem;
    line-height: 1.7;
    margin-bottom: 1.8rem;
    font-weight: 400;
  }

  .options-grid {
    display: grid;
    gap: 0.75rem;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text);
    padding: 0.9rem 1.2rem;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    font-size: 0.95rem;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
    line-height: 1.5;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    border-color: rgba(124,58,237,0.5);
    background: rgba(124,58,237,0.1);
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.2);
    color: #fff;
  }

  .option-btn.selected::before {
    content: '✓';
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--glow);
    font-weight: 700;
  }

  .option-label {
    display: inline-block;
    width: 1.5rem;
    height: 1.5rem;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 0.75rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.5rem;
    margin-right: 0.75rem;
    flex-shrink: 0;
    color: var(--muted);
    transition: all 0.2s;
    vertical-align: middle;
  }

  .option-btn.selected .option-label {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .quiz-nav {
    max-width: 760px;
    margin: 1.5rem auto 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn-nav {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    padding: 0.7rem 1.5rem;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.9rem;
    transition: all 0.2s;
  }

  .btn-nav:hover { border-color: rgba(255,255,255,0.4); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-next {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    padding: 0.7rem 2rem;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(124,58,237,0.3);
  }

  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(124,58,237,0.5); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Anti-cheat warning */
  .anti-cheat-toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(239,68,68,0.9);
    color: #fff;
    padding: 0.75rem 1.5rem;
    border-radius: 999px;
    font-size: 0.85rem;
    z-index: 999;
    transition: transform 0.4s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .anti-cheat-toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ===== RESULT ===== */
  #result { display: none; min-height: 100vh; padding: 3rem 1rem; }

  .result-wrap {
    max-width: 720px;
    margin: 0 auto;
    text-align: center;
  }

  .result-level-badge {
    display: inline-block;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.4rem 1.2rem;
    border-radius: 999px;
    margin-bottom: 1.5rem;
  }

  .result-creature {
    font-size: 6rem;
    margin-bottom: 1rem;
    animation: bounceIn 0.6s ease;
  }

  .result-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    margin-bottom: 0.75rem;
    line-height: 1.2;
  }

  .result-score-ring {
    width: 160px;
    height: 160px;
    margin: 2rem auto;
    position: relative;
  }

  .result-score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }

  .result-score-ring .ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 12; }
  .result-score-ring .ring-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1.2s ease; }

  .result-score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-score-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1;
  }

  .result-score-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .result-desc {
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--muted);
    margin-bottom: 2rem;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  .result-desc strong { color: var(--text); }

  .dimension-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    margin: 2rem 0;
    text-align: left;
  }

  .dim-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 1.2rem;
  }

  .dim-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.75rem;
  }

  .dim-icon { font-size: 1.2rem; }

  .dim-name {
    font-size: 0.85rem;
    font-weight: 500;
  }

  .dim-bar-wrap {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 0.4rem;
  }

  .dim-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 1s ease 0.3s;
  }

  .dim-score-text {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .result-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2rem;
  }

  .btn-retry {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    padding: 0.85rem 2rem;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(124,58,237,0.3);
  }

  .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(124,58,237,0.5); }

  .btn-share {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text);
    padding: 0.85rem 2rem;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .btn-share:hover { border-color: rgba(255,255,255,0.5); }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.1); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .question-card.entering { animation: slideIn 0.3s ease; }

  /* Decorative floating particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    opacity: 0.3;
    animation: float linear infinite;
  }

  @keyframes float {
    from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    to { transform: translateY(-20px) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 600px) {
    .dimension-grid { grid-template-columns: 1fr; }
    .question-card { padding: 1.5rem 1.2rem; }
    .intro-stats { gap: 1.5rem; }
  }

  /* Glitch effect on title */
  .result-title.glitch {
    animation: glitch 0.3s ease;
  }

  @keyframes glitch {
    0% { transform: translateX(0); }
    20% { transform: translateX(-3px); filter: hue-rotate(90deg); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-2px); filter: hue-rotate(-90deg); }
    80% { transform: translateX(2px); }
    100% { transform: translateX(0); filter: none; }
  }

  .copied-tip {
    font-size: 0.75rem;
    color: var(--green);
    margin-top: 0.5rem;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .copied-tip.show { opacity: 1; }
</style>
</head>
<body>
<div class="page">

<!-- INTRO -->
<section id="intro">
  <div class="intro-badge">蛆度科学研究院 出品</div>
  <h1 class="intro-title">你有多蛆？</h1>
  <p class="intro-sub">
    经过严肃的<em>伪科学研究</em>，本测试将从四大维度精准鉴定你的蛆属等级。<br>
    共25题，含抗乱选机制，建议诚实作答（虽然你可能不敢）
  </p>
  <div class="intro-stats">
    <div class="stat-item">
      <div class="stat-num">100</div>
      <div class="stat-label">题库总量</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">25</div>
      <div class="stat-label">随机抽题</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">4</div>
      <div class="stat-label">检测维度</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">9</div>
      <div class="stat-label">蛆属等级</div>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">开始检测蛆性 →</button>
  <p class="warning-text">⚠ 本测试结果可能引发不适，请做好心理准备</p>
</section>

<!-- QUIZ -->
<section id="quiz">
  <div class="quiz-header">
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-label">
        <span id="progress-text">第 1 / 25 题</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <span class="quiz-category-badge" id="cat-badge">——</span>
  </div>

  <div class="question-card" id="question-card">
    <div class="question-num" id="question-num">01</div>
    <div class="question-text" id="question-text">题目加载中...</div>
    <div class="options-grid" id="options-grid"></div>
  </div>

  <div class="quiz-nav">
    <button class="btn-nav" id="btn-prev" onclick="prevQ()" disabled>← 上一题</button>
    <span style="font-size:0.8rem;color:var(--muted)" id="answered-count">已答 0 / 25</span>
    <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>下一题 →</button>
  </div>
</section>

<!-- RESULT -->
<section id="result">
  <div class="result-wrap">
    <div class="result-level-badge" id="result-badge">——</div>
    <div class="result-creature" id="result-creature">🦟</div>
    <h2 class="result-title" id="result-title">正在计算...</h2>
    <div class="result-score-ring">
      <svg viewBox="0 0 160 160">
        <circle class="ring-bg" cx="80" cy="80" r="68"/>
        <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="68" stroke-dasharray="427.26" stroke-dashoffset="427.26"/>
      </svg>
      <div class="result-score-center">
        <div class="result-score-num" id="score-num">0</div>
        <div class="result-score-label">蛆力值</div>
      </div>
    </div>
    <p class="result-desc" id="result-desc"></p>
    <div class="dimension-grid" id="dimension-grid"></div>
    <div class="result-actions">
      <button class="btn-retry" onclick="retryQuiz()">再测一次（不信邪）</button>
      <button class="btn-share" onclick="shareResult()">复制结果分享</button>
    </div>
    <div class="copied-tip" id="copied-tip">✓ 已复制到剪贴板</div>
  </div>
</section>

</div>

<div class="anti-cheat-toast" id="toast"></div>

<script>
// ========== 题库 ==========
const ALL_QUESTIONS = [

// === A: 二次元沉迷度 (25题) ===
{cat:'A', catName:'二次元沉迷度', q:'你的手机壁纸是什么？', opts:['风景照或自拍',  '网上随便找的图', '你的二次元老婆/老公', '多张轮换，老婆换季如换衣'], scores:[0,1,3,5]},
{cat:'A', catName:'二次元沉迷度', q:'看到喜欢的番被腰斩，你会怎样？', opts:['没关系，追番只是爱好', '有点可惜，去找同类番', '在评论区骂制作组一整天', '成立应援会，写联名请愿书'], scores:[0,1,3,5]},
{cat:'A', catName:'二次元沉迷度', q:'你能脱口报出多少部动漫的主角名字？', opts:['10部以下', '10-50部', '50-100部', '超过100部，还包括他们的CV（声优）'], scores:[0,1,3,5]},
{cat:'A', catName:'二次元沉迷度', q:'你怎么看待"二次元老婆"这件事？', opts:['纸片人是纸片人，分得清', '看看可以，不会说是老婆', '他/她就是我老婆，三次元是备胎', '不只有老婆，还有后宫，建有专属图册'], scores:[0,1,3,5]},

// ========== 抗乱选机制 ==========
// 记录每题选择时间、速度异常检测
const antiCheat = {
  startTimes: {},
  totalTime: 0,
  suspiciousCount: 0,
  allSameOption: false,
  answers: [],

  recordStart(idx) {
    this.startTimes[idx] = Date.now();
  },

  recordAnswer(idx, optionIdx, totalOptions) {
    const elapsed = (Date.now() - (this.startTimes[idx] || Date.now())) / 1000;
    return elapsed;
  },

  analyze(answers) {
    if (answers.length < 5) return { penalty: 0, msg: '' };
    
    // 检测是否全选同一个选项
    const unique = new Set(answers.map(a => a.optIdx));
    if (unique.size === 1 && answers.length >= 10) {
      return { penalty: 0.7, msg: '检测到异常选择模式，已启动防蛆校正算法' };
    }

    // 检测是否速度过快（平均每题<2秒）
    const fastCount = answers.filter(a => a.time < 2).length;
    const fastRatio = fastCount / answers.length;
    if (fastRatio > 0.6 && answers.length >= 8) {
      return { penalty: 0.5, msg: '您的手速已超越人类极限，系统已进行惩罚校正' };
    }

    // 检测是否只选第一个或最后一个
    const firstLast = answers.filter(a => a.optIdx === 0 || a.optIdx === answers[0].totalOpts - 1).length;
    if (firstLast / answers.length > 0.8 && answers.length >= 10) {
      return { penalty: 0.4, msg: '检测到边缘选择偏好，您的蛆性已被重新评估' };
    }

    return { penalty: 0, msg: '' };
  }
};

function drawQuestions() {
  const cats = ['A','B','C','D'];
  let selected = [];
  cats.forEach(cat => {
    const pool = ALL_QUESTIONS.filter(q => q.cat === cat);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    // 每类抽至少5题，凑25
    selected = selected.concat(shuffled.slice(0, 7));
  });
  // 最终打乱，凑到25题
  selected = selected.sort(() => Math.random() - 0.5).slice(0, 25);
  return selected;
}

  grid.innerHTML = '';
  optOrder.forEach((realIdx, dispIdx) => {

    btn.className = 'option-btn' + (answers[currentIdx] !== undefined && answers[currentIdx].realOptIdx === realIdx ? ' selected' : '');
    btn.innerHTML = `<span class="option-label">${labels[dispIdx]}</span>${q.opts[realIdx]}`;
    btn.onclick = () => selectOption(realIdx, btn, q.scores[realIdx]);
    grid.appendChild(btn);
  });

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = answers[currentIdx] === undefined;
  document.getElementById('btn-next').textContent = currentIdx === 24 ? '提交结果 ✓' : '下一题 →';

  antiCheat.recordStart(currentIdx);
}

// 打乱选项顺序（但保持合理性）
function shuffleOptions(len) {
  // 轻微随机，避免每次都一样顺序
  const arr = Array.from({length: len}, (_, i) => i);
  // 只做轻微shuffle以保证用户体验，不完全随机
  if (Math.random() > 0.4) {
    const i = Math.floor(Math.random() * (len - 1));
    [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
  }
  return arr;
}

function selectOption(realOptIdx, btnEl, score) {
  const elapsed = antiCheat.recordAnswer(currentIdx, realOptIdx, quizQuestions[currentIdx].opts.length);
  answers[currentIdx] = { realOptIdx, score, time: elapsed };

  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');

  document.getElementById('btn-next').disabled = false;
  document.getElementById('answered-count').textContent = `已答 ${Object.keys(answers).length} / 25`;

  // 极速选择警告
  if (elapsed < 0.8) {
    showToast('这么快？你在乱选吗？（已记录）');
  }
}

function nextQ() {
  if (answers[currentIdx] === undefined) return;
  if (currentIdx < 24) {
    currentIdx++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.target + '%';
    });
  }, 400);

  // Title glitch
  setTimeout(() => {
    document.getElementById('result-title').classList.add('glitch');
  }, 800);

  window._resultData = { finalScore, level, catScores, catCounts };
}

function retryQuiz() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'flex';
}

function shareResult() {
  const d = window._resultData;
  if (!d) return;
  const text = `【蛆度测试结果】\n` +
    `我的等级：${d.level.title} ${d.level.creature}\n` +
    `蛆力值：${d.finalScore}/125\n` +
    `${d.level.badge}\n\n` +
    `二次元沉迷度：${Math.round(d.catScores.A/(d.catCounts.A*5||1)*100)}%\n` +
    `社交荒漠度：${Math.round(d.catScores.B/(d.catCounts.B*5||1)*100)}%\n` +
    `作息混乱度：${Math.round(d.catScores.C/(d.catCounts.C*5||1)*100)}%\n` +
    `精神状态指数：${Math.round(d.catScores.D/(d.catCounts.D*5||1)*100)}%\n\n` +
    `测测你有多蛆 👾`;
  
  navigator.clipboard.writeText(text).then(() => {
    const tip = document.getElementById('copied-tip');
    tip.classList.add('show');
    setTimeout(() => tip.classList.remove('show'), 2000);
  });
}

// Decorative particles
function spawnParticles() {
  const colors = ['#7c3aed','#a855f7','#c084fc','#6d28d9'];
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${Math.random()*5}s;
    `;
    document.body.appendChild(p);
  }
}
</script>
</body>
</html>
